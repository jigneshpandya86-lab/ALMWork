name: Deploy SchoolDocGenie to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'SchoolDocGenie/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SchoolDocGenie
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: SchoolDocGenie/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SchoolDocGenie
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: SchoolDocGenie/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            SchoolDocGenie/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('SchoolDocGenie/package-lock.json') }}-${{ hashFiles('SchoolDocGenie/src/**/*.[jt]s', 'SchoolDocGenie/src/**/*.[jt]sx', 'SchoolDocGenie/next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('SchoolDocGenie/package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: SchoolDocGenie/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
